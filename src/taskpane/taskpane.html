<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contoso Task Pane Add-in</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <!-- Global Layout Styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <main id="app-body" style="height: 100vh; overflow: hidden; position: relative; background-color: #f9fafb;">
        
        <!-- HOME SCREEN DASHBOARD -->
        <div id="home-screen" class="screen active">
            <div class="dashboard-header">
                <h2 class="ms-font-xl" style="font-weight: 600; color: #1f2937; margin: 0;">ReySkripsi</h2>
                <p class="ms-font-s" style="color: #4b5563; margin-top: 4px;">Pilih alat untuk merapikan dokumen</p>
            </div>
            
            <div class="app-grid" id="app-grid">
                <!-- Dynamically injected by AppRouter -->
            </div>
        </div>

        <!-- CONTAINER FOR DYNAMIC MODULES -->
        <div id="module-container" style="height: 100%; width: 100%;">
            <!-- Modules will be loaded here via JS -->
        </div>


    </main>
</body>

</html>
